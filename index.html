<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#132238" />

  <!-- Favicons -->
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

  <!-- Android & PWA -->
  <link rel="manifest" href="/site.webmanifest" />

  <!-- Canonical URL -->
  <link rel="canonical" href="https://magnivel.com/" />

  <!-- Preconnect to external APIs -->
  <link rel="preconnect" href="https://api.magnivel.com" />
  <link rel="preconnect" href="https://magnivelinternational.com" />
  <link rel="preconnect" href="https://res.cloudinary.com" crossorigin />

  <!-- DNS Prefetch (performance) -->
  <link rel="dns-prefetch" href="//res.cloudinary.com">
  <link rel="dns-prefetch" href="//api.magnivel.com">

  <!-- Primary SEO -->
  <title>Magnivel Media | Read, Write &amp; Share Articles on AI, Tech &amp; Innovation</title>
  <meta name="description"
    content="Magnivel Media is a modern platform to read, write, and share ideas on technology, AI, startups, and innovation. Discover insights, publish articles, and grow your audience.">
  <meta name="keywords"
    content="Magnivel, Media, Read, Write, Share, Ideas, Technology, AI Conference, Business, Innovation">
  <meta name="robots" content="index, follow">
  <meta name="author" content="Magnivel Media">
  <meta name="language" content="English">

  <!-- Open Graph (Facebook, LinkedIn, WhatsApp) -->
  <meta property="og:title" content="Magnivel Media | Read, Write &amp; Share Articles on AI, Tech &amp; Innovation" />
  <meta property="og:description" content="Read and publish articles on AI, tech and innovation." />
  <meta property="og:image" content="https://magnivel.com/preview.png" />
  <meta property="og:url" content="https://magnivel.com/" />
  <meta property="og:type" content="website" />

  <!-- Twitter Cards -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Magnivel Media" />
  <meta name="twitter:description" content="Read and publish articles on AI, tech and innovation." />
  <meta name="twitter:image" content="https://magnivel.com/preview.png" />

  <!-- Structured Data: WebSite -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "Magnivel Media",
    "url": "https://magnivel.com/",
    "description": "Magnivel Media is a modern platform to read, write, and share ideas on technology, AI, startups, and innovation. Discover insights, publish articles, and grow your audience.",
    "publisher": {
      "@type": "Organization",
      "name": "Magnivel Media",
      "url": "https://magnivel.com/"
    },
    "potentialAction": {
      "@type": "SearchAction",
      "target": "https://magnivel.com/explore?q={search_term_string}",
      "query-input": "required name=search_term_string"
    }
  }
  </script>

  <!-- Structured Data: Organization -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Organization",
    "name": "Magnivel Media",
    "url": "https://magnivel.com",
    "logo": "https://magnivel.com/logo.png",
    "sameAs": [
      "https://www.linkedin.com/company/magnivel",
      "https://twitter.com/magnivel"
    ]
  }
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
